<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Online</title>
<meta name="description" content="Convert images to PDF online for free. JPG, PNG supported.">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.21.0/pdf-lib.min.js"></script>
</head>
<body>
<header>
<div class="container">
<img src="assets/logo.png" alt="Logo" class="logo">
<nav>
<a href="index.html">Home</a>
<a href="merge.html">Merge</a>
<a href="split.html">Split</a>
<a href="compress.html">Compress</a>
<a href="convert.html">Convert</a>
</nav>
</div>
</header>

<main>
<section class="tool-section">
<h2>Image → PDF</h2>
<input type="file" id="imgFiles" multiple accept="image/*">
<button id="convertBtn">Convert to PDF</button>
<div id="convertOutput"></div>
</section>
</main>

<script>
document.getElementById('convertBtn').addEventListener('click',async()=>{
  const files=[...document.getElementById('imgFiles').files];
  const output=document.getElementById('convertOutput');
  if(!files.length){alert('Select images');return;}
  output.innerHTML='Processing...';
  const pdfDoc=await PDFLib.PDFDocument.create();
  for(let f of files){
    const bytes=await f.arrayBuffer();
    const img=await PDFLib.PDFImage.fromBytes(pdfDoc,bytes);
    const page=pdfDoc.addPage([img.width,img.height]);
    page.drawImage(img,{x:0,y:0,width:img.width,height:img.height});
  }
  const pdfBytes=await pdfDoc.save();
  const blob=new Blob([pdfBytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  output.innerHTML=`<a href="${url}" download="images.pdf">Download PDF</a>`;
});
</script>
</body>
</html>
