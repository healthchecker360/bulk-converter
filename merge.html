<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge PDFs Online</title>
<meta name="description" content="Merge multiple PDF files into one PDF online for free. Fast and secure.">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.21.0/pdf-lib.min.js"></script>
</head>
<body>
<header>
<div class="container">
<img src="assets/logo.png" alt="Logo" class="logo">
<nav>
<a href="index.html">Home</a>
<a href="merge.html">Merge</a>
<a href="split.html">Split</a>
<a href="compress.html">Compress</a>
<a href="convert.html">Convert</a>
</nav>
</div>
</header>

<main>
<section class="tool-section">
<h2>Merge PDFs</h2>
<input type="file" id="mergeFiles" multiple accept="application/pdf">
<button id="mergeBtn">Merge PDFs</button>
<div id="mergeOutput"></div>
</section>
</main>

<script>
async function mergePDFs(files){
  const mergedPdf = await PDFLib.PDFDocument.create();
  for (let file of files){
    const bytes = await file.arrayBuffer();
    const pdf = await PDFLib.PDFDocument.load(bytes);
    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
    copiedPages.forEach(p=>mergedPdf.addPage(p));
  }
  const mergedBytes = await mergedPdf.save();
  return new Blob([mergedBytes],{type:'application/pdf'});
}

document.getElementById('mergeBtn').addEventListener('click', async ()=>{
  const files=[...document.getElementById('mergeFiles').files];
  const output=document.getElementById('mergeOutput');
  if(!files.length){alert('Select PDFs');return;}
  output.innerHTML='Processing...';
  try{
    const mergedBlob=await mergePDFs(files);
    const url=URL.createObjectURL(mergedBlob);
    output.innerHTML=`<a href="${url}" download="merged.pdf">Download Merged PDF</a>`;
  }catch(err){output.innerHTML='Error: '+err.message;}
});
</script>
</body>
</html>
